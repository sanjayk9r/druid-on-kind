apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "garage.name" . }}
  labels:
    {{- include "garage.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "garage.name" . }}
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ include "garage.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "garage.name" . }}
        {{- include "garage.labels" . | nindent 8 }}
      annotations:
        # Roll the pod when garage.toml changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: garage
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ports.s3Api }}
              name: s3-api
            - containerPort: {{ .Values.ports.s3Web }}
              name: s3-web
            - containerPort: {{ .Values.ports.admin }}
              name: admin
          volumeMounts:
            - name: config
              mountPath: /etc/garage.toml
              subPath: garage.toml
            - name: meta
              mountPath: /var/lib/garage/meta
            - name: data
              mountPath: /var/lib/garage/data
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "garage.name" . }}-config
  volumeClaimTemplates:
    - metadata:
        name: meta
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.persistence.meta.size }}
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName }}
        {{- end }}
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.persistence.data.size }}
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName }}
        {{- end }}
